<div class="min-h-[80vh] flex items-center justify-center px-4 py-20 relative overflow-hidden">
    <div class="absolute top-[10%] left-[10%] w-[500px] h-[500px] bg-red-100/30 rounded-full blur-[120px] -z-10">
    </div>

    <div
        class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl shadow-red-900/10 border border-slate-100 p-10 relative">
        <div class="text-center mb-10">
            @if (success) {
            <div class="animate-in zoom-in duration-500">
                <div
                    class="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-8 animate-bounce">
                    <lucide-icon name="ShieldCheck" class="w-12 h-12"></lucide-icon>
                </div>
                <h1 class="text-3xl font-black text-slate-900 mb-2">Welcome Aboard!</h1>
                <p class="text-slate-500">Your account has been created. Redirecting you to the premium gear vault...
                </p>
            </div>
            } @else {
            <div
                class="w-16 h-16 bg-gradient-to-br from-red-500 to-red-600 rounded-2xl flex items-center justify-center text-white mx-auto mb-6 shadow-lg">
                <lucide-icon name="Package" class="w-8 h-8"></lucide-icon>
            </div>
            <h1 class="text-3xl font-black text-slate-900">Get Started</h1>
            <p class="text-slate-500 mt-2">Create your MobiShop account</p>
            }
        </div>

        @if (!success) {
        <form (ngSubmit)="onSubmit()" class="space-y-6">
            @if (error) {
            <div class="p-4 bg-red-50 border border-red-100 text-red-600 rounded-2xl text-sm font-medium">
                {{ error }}
            </div>
            }

            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">Full Name</label>
                <div class="relative">
                    <lucide-icon name="User"
                        class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></lucide-icon>
                    <input type="text" [(ngModel)]="name" name="name" required
                        class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white focus:ring-2 focus:ring-red-500/20 focus:border-red-500 outline-none transition-all"
                        placeholder="John Doe">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">Email Address</label>
                <div class="relative">
                    <lucide-icon name="Mail"
                        class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></lucide-icon>
                    <input type="email" [(ngModel)]="email" name="email" required
                        class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white focus:ring-2 focus:ring-red-500/20 focus:border-red-500 outline-none transition-all"
                        placeholder="name@example.com">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">Password</label>
                <div class="relative">
                    <lucide-icon name="Lock"
                        class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></lucide-icon>
                    <input type="password" [(ngModel)]="password" name="password" required
                        class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white focus:ring-2 focus:ring-red-500/20 focus:border-red-500 outline-none transition-all"
                        placeholder="6+ characters">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">Confirm Password</label>
                <div class="relative">
                    <lucide-icon name="Lock"
                        class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></lucide-icon>
                    <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required
                        class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white focus:ring-2 focus:ring-red-500/20 focus:border-red-500 outline-none transition-all"
                        placeholder="Repeat password">
                </div>
            </div>

            <button type="submit" [disabled]="loading"
                class="w-full py-4 bg-red-600 text-white rounded-2xl font-bold hover:bg-red-700 transition-all shadow-xl shadow-red-500/20 active:scale-95 disabled:opacity-50 flex items-center justify-center space-x-2">
                @if (loading) {
                <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2"></div>
                <span>Creating your account...</span>
                } @else {
                <span>Create Account</span>
                <lucide-icon name="ArrowRight" class="w-5 h-5"></lucide-icon>
                }
            </button>
        </form>

        <div class="mt-10 text-center text-sm">
            <span class="text-slate-500">Already have an account?</span>
            <a routerLink="/login"
                class="ml-1 font-bold text-red-600 hover:text-red-700 underline decoration-red-200 underline-offset-4">Log
                in</a>
        </div>
        }
    </div>
</div>
