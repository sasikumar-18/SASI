<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 min-h-screen">
    <div class="flex items-center space-x-6 mb-12 animate-reveal">
        <div
            class="w-16 h-16 rounded-2xl bg-bg-secondary border border-glass-border flex items-center justify-center shadow-xl">
            <i class="fas fa-heart text-3xl text-red-600"></i>
        </div>
        <div>
            <h1 class="text-5xl font-black text-main uppercase tracking-tighter italic">Wishlist </h1>
            <p class="text-muted text-xs font-black uppercase tracking-[0.4em] mt-2">Saved Operations</p>
        </div>
    </div>

    @if (wishlistService.totalItems() > 0) {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        @for (product of wishlistService.items(); track product.id) {
        <div
            class="group relative bg-bg-secondary rounded-[2.5rem] p-4 border border-glass-border hover:border-red-600/30 transition-all duration-500 hover:shadow-2xl hover:shadow-red-600/10 hover:-translate-y-2 animate-reveal">

            <!-- Product Card Content (Simplified) -->
            <div class="relative aspect-[4/5] rounded-[2rem] overflow-hidden mb-6 bg-white/5">
                <img [src]="product.imageUrl" [alt]="product.name" onerror="this.onerror=null; this.src='/assets/images/default.jpg'"
                    class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-60">
                </div>

                <button (click)="wishlistService.removeFromWishlist(product.id)"
                    class="absolute top-4 right-4 w-10 h-10 rounded-full glass flex items-center justify-center text-white hover:bg-red-600 hover:text-white transition-all shadow-xl z-10">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="px-2 mb-4">
                <h3 class="text-lg font-black text-main uppercase tracking-tight line-clamp-1 mb-1">{{ product.name }}
                </h3>
                <p class="text-red-500 font-bold font-mono">â‚¹{{ product.price | number }}</p>
            </div>

            <button (click)="wishlistService.moveToCart(product)"
                class="w-full py-4 bg-main rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] text-main border border-glass-border group-hover:bg-red-600 group-hover:text-white transition-all shadow-lg active:scale-95 flex items-center justify-center gap-3">
                <i class="fas fa-shopping-cart"></i>
                <span>Move to Cart</span>
            </button>
        </div>
        }
    </div>
    } @else {
    <div class="flex flex-col items-center justify-center py-40 animate-reveal">
        <div
            class="w-48 h-48 bg-bg-secondary rounded-[5rem] flex items-center justify-center mb-12 shadow-inner border border-glass-border">
            <i class="far fa-heart text-7xl text-muted/30"></i>
        </div>
        <h2 class="text-4xl font-black text-main uppercase tracking-tighter italic mb-4">Empty Repository</h2>
        <p class="text-muted text-xl max-w-md text-center leading-relaxed">Your wishlist is currently void of any data .</p>
        <button routerLink="/products"
            class="mt-12 px-12 py-5 bg-red-600 text-white rounded-[2rem] font-black text-[10px] uppercase tracking-[0.4em] shadow-xl hover:scale-105 transition-all">
            Access Catalog
        </button>
    </div>
    }
</div>
