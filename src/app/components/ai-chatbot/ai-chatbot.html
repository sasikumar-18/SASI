<!-- Chatbot Toggle Button -->
<button (click)="toggleChat()"
    class="fixed bottom-8 right-8 w-20 h-20 bg-red-600 rounded-[2rem] shadow-[0_20px_40px_rgba(220,38,38,0.4)] flex items-center justify-center text-white transition-all hover:scale-110 active:scale-95 group z-[100]">
    <div class="relative">
        @if (!isOpen()) {
        <div
            class="absolute inset-0 bg-white/20 blur-xl rounded-full scale-110 opacity-0 group-hover:opacity-100 transition-opacity">
        </div>
        <i class="fas fa-robot text-3xl relative animate-float"></i>
        } @else {
        <i class="fas fa-times text-2xl relative"></i>
        }
    </div>
</button>

<!-- Chat Window -->
@if (isOpen()) {
<div
    class="fixed bottom-32 right-8 w-[400px] h-[600px] glass rounded-[3rem] shadow-2xl border border-glass-border flex flex-col overflow-hidden animate-reveal-up z-[100] origin-bottom-right">

    <!-- Header -->
    <div class="p-8 border-b border-glass-border bg-white/5 flex items-center space-x-4">
        <div class="w-12 h-12 rounded-2xl bg-red-600 flex items-center justify-center shadow-lg shadow-red-600/30">
            <i class="fas fa-brain text-white"></i>
        </div>
        <div>
            <h3 class="text-sm font-black text-main uppercase tracking-[0.3em]">Nexus AI</h3>
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-[9px] font-black text-muted uppercase tracking-widest"> Active</span>
            </div>
        </div>
    </div>

    <!-- Messages Area -->
    <div #scrollMe class="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar">
        @for (msg of messages(); track msg.timestamp) {
        <div class="flex flex-col" [class.items-end]="msg.role === 'user'">
            <div class="max-w-[85%] p-5 rounded-[1.5rem]" [class.bg-red-600]="msg.role === 'user'"
                [class.text-white]="msg.role === 'user'" [class.bg-bg-secondary]="msg.role === 'assistant'"
                [class.border]="msg.role === 'assistant'" [class.border-glass-border]="msg.role === 'assistant'"
                [class.text-main]="msg.role === 'assistant'">

                <p class="text-xs font-bold leading-relaxed">{{ msg.content }}</p>

                @if (msg.type === 'comparison') {
                <div class="mt-4 pt-4 border-t border-glass-border space-y-3">
                    <button [routerLink]="['/compare']"
                        class="w-full py-3 bg-white/5 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-white/10 transition-all">
                        Open Visual Matrix
                    </button>
                </div>
                }
            </div>
            <span class="text-[8px] font-black text-muted uppercase mt-2 px-2">
                {{ msg.timestamp | date:'shortTime' }} | {{ msg.role === 'user' ? 'Client' : 'Nexus' }}
            </span>
        </div>
        }

        @if (isTyping()) {
        <div class="flex items-center space-x-2 p-5 bg-bg-secondary border border-glass-border rounded-[1.5rem] w-fit">
            <div class="w-1.5 h-1.5 bg-muted rounded-full animate-bounce"></div>
            <div class="w-1.5 h-1.5 bg-muted rounded-full animate-bounce [animation-delay:0.2s]"></div>
            <div class="w-1.5 h-1.5 bg-muted rounded-full animate-bounce [animation-delay:0.4s]"></div>
        </div>
        }
    </div>

    <!-- Input Area -->
    <div class="p-8 border-t border-glass-border bg-white/5">
        <form (submit)="sendMessage()" class="relative">
            <input type="text" [(ngModel)]="userInput" name="userInput" placeholder="Synchronize command..."
                class="w-full bg-bg-secondary border-2 border-glass-border rounded-2xl py-4 pl-6 pr-16 text-xs font-bold text-main outline-none focus:border-red-600/30 transition-all placeholder:text-muted placeholder:opacity-40">
            <button type="submit" [disabled]="!userInput().trim()"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-red-600/20 disabled:opacity-50 disabled:grayscale transition-all hover:scale-105 active:scale-95">
                <i class="fas fa-paper-plane text-xs"></i>
            </button>
        </form>
    </div>
</div>
}
